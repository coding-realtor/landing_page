<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>글쓰기 | Jamsil Real Estate</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      "colors": {
        "secondary": "#004dc9","border": "#e5e8eb","surface": "#f2f4f6","muted": "#8b95a1","grey-700": "#333d4b",
        "on-surface": "#181c23","secondary-container": "#0063fd","on-secondary-container": "#f3f3ff",
        "on-secondary": "#ffffff","primary": "#0059b9","primary-container": "#1071e5","on-primary": "#ffffff",
        "error": "#f04452","surface-container": "#ecedf7","canvas": "#ffffff","grey-600": "#4e5968",
        "success": "#03b26c"
      },
      "borderRadius": { "DEFAULT": "0.25rem","lg": "0.5rem","xl": "0.75rem","full": "9999px" },
      "spacing": { "lg": "24px","base": "16px","xxl": "48px","xl": "32px" },
      "fontFamily": { "body-lg": ["Inter","sans-serif"],"display-lg": ["Plus Jakarta Sans","sans-serif"],"body-md": ["Inter","sans-serif"],"label-sm": ["Inter","sans-serif"],"heading-md": ["Plus Jakarta Sans","sans-serif"],"display-hero": ["Plus Jakarta Sans","sans-serif"] },
      "fontSize": { "body-lg": ["16px",{"lineHeight":"24px","fontWeight":"400"}],"display-lg": ["26px",{"lineHeight":"36px","fontWeight":"700"}],"body-md": ["14px",{"lineHeight":"22px","fontWeight":"400"}],"label-sm": ["12px",{"lineHeight":"16px","fontWeight":"500"}],"heading-md": ["20px",{"lineHeight":"28px","fontWeight":"600"}],"display-hero": ["30px",{"lineHeight":"40px","fontWeight":"700"}] }
    }
  }
}
</script>
<style>
body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; vertical-align: middle; }
</style>
</head>
<body class="bg-canvas text-on-surface">

<header class="bg-canvas border-b border-border fixed top-0 w-full z-50">
  <nav class="flex justify-between items-center h-20 px-base md:px-xxl max-w-7xl mx-auto w-full">
    <a href="index.html" class="font-display-lg text-display-lg text-secondary">Jamsil Real Estate</a>
    <div class="hidden md:flex items-center gap-xl">
      <a class="text-grey-700 font-medium hover:text-secondary transition-colors" href="index.html">Listings</a>
      <a class="text-secondary font-bold border-b-2 border-secondary pb-1" href="news.html">News</a>
      <a class="text-grey-700 font-medium hover:text-secondary transition-colors" href="#">About</a>
      <a class="text-grey-700 font-medium hover:text-secondary transition-colors" href="admin.html">Admin</a>
    </div>
    <div class="md:hidden">
      <span class="material-symbols-outlined text-grey-700">menu</span>
    </div>
  </nav>
</header>

<main class="pt-32 pb-xxl px-base md:px-xxl max-w-3xl mx-auto w-full min-h-screen">
  <div class="mb-lg">
    <a href="admin.html" class="inline-flex items-center gap-1 text-grey-600 hover:text-secondary transition-colors font-body-md text-body-md min-h-[44px]">
      <span class="material-symbols-outlined">arrow_back</span>관리자 페이지로
    </a>
  </div>

  <h1 id="page-title" class="font-display-hero text-display-hero text-on-surface mb-xl">새 글 작성</h1>

  <form id="post-form" class="space-y-lg pb-xxl">
    <div>
      <label class="block font-heading-md text-heading-md text-on-surface mb-2" for="category">카테고리</label>
      <select id="category" class="w-full bg-surface border border-border rounded-xl px-base py-3 font-body-lg text-body-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary min-h-[44px]">
        <option value="시황">시황</option>
        <option value="공지">공지</option>
        <option value="잠실정보">잠실정보</option>
        <option value="정책">정책</option>
        <option value="기타">기타</option>
      </select>
    </div>

    <div>
      <label class="block font-heading-md text-heading-md text-on-surface mb-2" for="title">제목</label>
      <input id="title" type="text" class="w-full bg-surface border border-border rounded-xl px-base py-3 font-body-lg text-body-lg text-on-surface placeholder:text-muted focus:border-primary focus:ring-1 focus:ring-primary min-h-[44px]" placeholder="게시글 제목을 입력하세요" required>
    </div>

    <div>
      <label class="block font-heading-md text-heading-md text-on-surface mb-2" for="date">날짜</label>
      <input id="date" type="date" class="w-full bg-surface border border-border rounded-xl px-base py-3 font-body-lg text-body-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary min-h-[44px]">
    </div>

    <div>
      <label class="block font-heading-md text-heading-md text-on-surface mb-2" for="content">본문 <span class="text-muted font-label-sm text-label-sm">(마크다운 지원)</span></label>
      <textarea id="content" rows="16" class="w-full bg-surface border border-border rounded-xl px-base py-3 font-body-md text-body-md text-on-surface placeholder:text-muted focus:border-primary focus:ring-1 focus:ring-primary resize-y" placeholder="내용을 마크다운으로 작성하세요.&#10;&#10;예시:&#10;## 소제목&#10;- 항목 1&#10;**굵게**, *기울임*"></textarea>
    </div>

    <div id="error-msg" class="hidden text-error font-body-md text-body-md bg-red-50 border border-red-200 rounded-xl px-base py-3"></div>
    <div id="success-msg" class="hidden text-success font-body-md text-body-md bg-green-50 border border-green-200 rounded-xl px-base py-3"></div>

    <div class="flex flex-col sm:flex-row gap-base">
      <button type="submit" id="submit-btn" class="flex-1 bg-primary text-on-primary py-4 rounded-xl font-heading-md text-heading-md hover:opacity-90 transition-all flex items-center justify-center gap-2 min-h-[44px]">
        <span class="material-symbols-outlined">save</span>저장
      </button>
      <a href="admin.html" class="flex-1 bg-surface border border-border text-grey-700 py-4 rounded-xl font-heading-md text-heading-md hover:bg-surface-container transition-all flex items-center justify-center min-h-[44px]">취소</a>
    </div>
  </form>
</main>

<div class="fixed bottom-0 left-0 right-0 bg-canvas border-t border-border flex md:hidden justify-around items-center h-16 z-50">
  <a class="flex flex-col items-center gap-1 text-grey-600 min-w-[44px] min-h-[44px] justify-center" href="index.html">
    <span class="material-symbols-outlined">home</span><span class="text-[10px]">홈</span>
  </a>
  <a class="flex flex-col items-center gap-1 text-grey-600 min-w-[44px] min-h-[44px] justify-center" href="news.html">
    <span class="material-symbols-outlined">newspaper</span><span class="text-[10px]">소식</span>
  </a>
  <a class="flex flex-col items-center gap-1 text-grey-600 min-w-[44px] min-h-[44px] justify-center" href="admin.html">
    <span class="material-symbols-outlined">person</span><span class="text-[10px]">관리</span>
  </a>
</div>

<script src="db.js"></script>
<script>
requireAdmin();

const params = new URLSearchParams(location.search);
const editId = params.get('id') ? Number(params.get('id')) : null;
let editPost = null;

const today = new Date().toISOString().slice(0, 10);
document.getElementById('date').value = today;

async function loadEditPost() {
  if (!editId) return;
  document.getElementById('page-title').textContent = '게시글 수정';
  const posts = await getPosts();
  editPost = posts.find(p => p.id === editId);
  if (!editPost) { showError('게시글을 찾을 수 없습니다.'); return; }
  document.getElementById('category').value = editPost.category || '시황';
  document.getElementById('title').value = editPost.title || '';
  document.getElementById('date').value = editPost.date || today;
  document.getElementById('content').value = editPost.content || '';
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.classList.remove('hidden');
  document.getElementById('success-msg').classList.add('hidden');
}

function showSuccess(msg) {
  const el = document.getElementById('success-msg');
  el.textContent = msg; el.classList.remove('hidden');
  document.getElementById('error-msg').classList.add('hidden');
}

document.getElementById('post-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const title = document.getElementById('title').value.trim();
  const content = document.getElementById('content').value.trim();
  if (!title) { showError('제목을 입력해주세요.'); return; }
  if (!content) { showError('본문을 입력해주세요.'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined">hourglass_empty</span>저장 중...';

  const post = {
    id: editId || null,
    category: document.getElementById('category').value,
    title,
    date: document.getElementById('date').value,
    content
  };

  try {
    await savePost(post);
    showSuccess('저장되었습니다! 잠시 후 이동합니다...');
    setTimeout(() => location.href = 'admin.html', 1500);
  } catch(err) {
    showError('저장 실패: ' + err.message);
    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined">save</span>저장';
  }
});

loadEditPost();
</script>
</body>
</html>
