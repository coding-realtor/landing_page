<script src="db.js"></script>
<script>
        function getParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        function renderPost(post) {
            const container = document.getElementById('post-container');
            if (!post) {
                container.innerHTML = '<div class="py-xxl text-center text-muted font-body-lg">게시글을 찾을 수 없습니다.</div>';
                return;
            }

            let adminActions = '';
            if (isAdmin()) {
                adminActions =
                    '<div class="flex gap-2 mt-xl pt-lg border-t border-border">' +
                    '<a href="news-write.html?id=' + encodeURIComponent(post.id) + '" class="inline-flex items-center gap-1 bg-surface border border-border text-grey-700 px-lg py-3 rounded-xl font-heading-md text-heading-md hover:bg-surface-container transition-all min-h-[44px]"><span class="material-symbols-outlined">edit</span> 수정</a>' +
                    '<button id="delete-btn" class="inline-flex items-center gap-1 bg-error-container text-on-error-container px-lg py-3 rounded-xl font-heading-md text-heading-md hover:opacity-90 transition-all min-h-[44px]"><span class="material-symbols-outlined">delete</span> 삭제</button>' +
                    '</div>';
            }

            container.innerHTML =
                '<div class="flex items-center gap-2 mb-base">' +
                '<span class="px-3 py-1 rounded-full bg-secondary-container text-on-secondary-container font-label-sm text-label-sm">' + escapeHtml(post.category || '소식') + '</span>' +
                '<span class="text-muted font-label-sm text-label-sm">' + escapeHtml(post.date || '') + '</span>' +
                '</div>' +
                '<h1 class="font-display-lg text-display-lg text-on-surface mb-lg leading-snug">' + escapeHtml(post.title || '') + '</h1>' +
                '<div class="post-content font-body-lg text-body-lg text-grey-700 border-t border-border pt-lg">' + renderMarkdown(post.content || '') + '</div>' +
                adminActions;

            const delBtn = document.getElementById('delete-btn');
            if (delBtn) {
                delBtn.addEventListener('click', async function () {
                    if (!confirm('정말 이 게시글을 삭제하시겠습니까?')) return;
                    delBtn.disabled = true;
                    delBtn.textContent = '삭제 중...';
                    try {
                        await deletePost(post.id);
                        window.location.href = 'news.html';
                    } catch (e) {
                        alert(e.message);
                        delBtn.disabled = false;
                        delBtn.textContent = '삭제';
                    }
                });
            }
        }

        (async function () {
            const id = getParam('id');
            if (!id) { renderPost(null); return; }
            try {
                const post = await getPost(id);
                renderPost(post);
            } catch (e) {
                renderPost(null);
            }
        })();
    </script>
