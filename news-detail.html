<!DOCTYPE html>
<html lang="ko">
<head>

  theme: {

        "on-surface": "#181c23","secondary-container": "#0063fd","on-secondary-container": "#f3f3ff",
        "surface-container-low": "#f2f3fd","on-secondary": "#ffffff","primary": "#0059b9",
        "primary-container": "#1071e5","on-primary": "#ffffff","error": "#f04452",
        "surface-container": "#ecedf7","canvas": "#ffffff","grey-600": "#4e5968"
      },
      "borderRadius": { "DEFAULT": "0.25rem","lg": "0.5rem","xl": "0.75rem","full": "9999px" },
      "spacing": { "lg": "24px","base": "16px","xxl": "48px","xl": "32px" },
      "fontFamily": { "body-lg": ["Inter","sans-serif"],"display-lg": ["Plus Jakarta Sans","sans-serif"],"body-md": ["Inter","sans-serif"],"label-sm": ["Inter","sans-serif"],"heading-lg": ["Plus Jakarta Sans","sans-serif"],"display-hero": ["Plus Jakarta Sans","sans-serif"],"heading-md": ["Plus Jakarta Sans","sans-serif"] },
      "fontSize": { "body-lg": ["16px",{"lineHeight":"24px","fontWeight":"400"}],"display-lg": ["26px",{"lineHeight":"36px","fontWeight":"700"}],"body-md": ["14px",{"lineHeight":"22px","fontWeight":"400"}],"label-sm": ["12px",{"lineHeight":"16px","fontWeight":"500"}],"heading-lg": ["22px",{"lineHeight":"30px","fontWeight":"700"}],"display-hero": ["30px",{"lineHeight":"40px","fontWeight":"700"}],"heading-md": ["20px",{"lineHeight":"28px","fontWeight":"600"}] }
    }

<style>
body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; vertical-align: middle; }

<body class="bg-canvas text-on-surface">

<header class="bg-canvas border-b border-border fixed top-0 w-full z-50">
  <nav class="flex justify-between items-center h-20 px-base md:px-xxl max-w-7xl mx-auto w-full">
    <a href="index.html" class="font-display-lg text-display-lg text-secondary">Jamsil Real Estate</a>
    <div class="hidden md:flex items-center gap-xl">
      <a class="text-grey-700 font-medium hover:text-secondary transition-colors" href="index.html">Listings</a>
      <a class="text-secondary font-bold border-b-2 border-secondary pb-1" href="news.html">News</a>
      <a class="text-grey-700 font-medium hover:text-secondary transition-colors" href="#">About</a>
      <a class="text-grey-700 font-medium hover:text-secondary transition-colors" href="#">Contact</a>
      <button class="bg-secondary-container text-on-secondary-container px-lg py-2 rounded-lg font-bold hover:opacity-80 transition-all duration-200">Call Agent</button>
    </div>
    <div class="md:hidden">
      <span class="material-symbols-outlined text-grey-700">menu</span>
    </div>
  </nav>
</header>

<main class="pt-32 pb-xxl px-base md:px-xxl max-w-4xl mx-auto w-full min-h-screen">
  <div class="mb-lg">
    <a href="news.html" class="inline-flex items-center gap-1 text-grey-600 hover:text-secondary transition-colors font-body-md text-body-md min-h-[44px]">
      <span class="material-symbols-outlined">arrow_back</span>목록으로
    </a>
  </div>

  <article id="post-container" class="bg-canvas">
    <div class="py-xl text-center text-muted font-body-md text-body-md">게시글을 불러오는 중...</div>
  </article>

  <div id="admin-actions" class="hidden mt-xl flex gap-base">
    <button id="edit-btn" class="flex items-center gap-2 px-lg py-3 bg-primary text-on-primary rounded-xl font-heading-md text-heading-md hover:opacity-90 transition-all min-h-[44px]">
      <span class="material-symbols-outlined">edit</span>수정
    </button>
    <button id="delete-btn" class="flex items-center gap-2 px-lg py-3 bg-error text-white rounded-xl font-heading-md text-heading-md hover:opacity-90 transition-all min-h-[44px]">
      <span class="material-symbols-outlined">delete</span>삭제
    </button>
  </div>
</main>

<footer class="w-full py-xxl px-base md:px-xxl flex flex-col md:flex-row justify-between items-center gap-base bg-surface border-t border-border mt-xxl">
  <div class="flex flex-col gap-2">
    <div class="font-heading-md text-heading-md text-grey-700">Jamsil Real Estate</div>
    <p class="font-body-md text-body-md text-grey-600">© 2024 Jamsil Real Estate Agency. All rights reserved.</p>
  </div>
  <div class="flex gap-lg flex-wrap justify-center">
    <a class="text-grey-600 font-body-md text-body-md hover:underline" href="#">Privacy Policy</a>
    <a class="text-grey-600 font-body-md text-body-md hover:underline" href="#">Terms of Service</a>
    <a id="agent-login-btn" class="text-grey-600 font-body-md text-body-md hover:underline" href="admin.html">Agent Login</a>
  </div>
</footer>

<div class="fixed bottom-0 left-0 right-0 bg-canvas border-t border-border flex md:hidden justify-around items-center h-16 z-50">
  <a class="flex flex-col items-center gap-1 text-grey-600 min-w-[44px] min-h-[44px] justify-center" href="index.html">
    <span class="material-symbols-outlined">home</span><span class="text-[10px]">홈</span>
  </a>
  <a class="flex flex-col items-center gap-1 text-secondary font-bold min-w-[44px] min-h-[44px] justify-center" href="news.html">
    <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">newspaper</span><span class="text-[10px]">소식</span>
  </a>
  <a class="flex flex-col items-center gap-1 text-grey-600 min-w-[44px] min-h-[44px] justify-center" href="admin.html">
    <span class="material-symbols-outlined">person</span><span class="text-[10px]">관리</span>
  </a>
</div>

<script src="db.js"></script>
<script>
const params = new URLSearchParams(location.search);
const postId = Number(params.get('id'));

async function init() {
  const posts = await getPosts();
  const post = posts.find(p => p.id === postId);
  const container = document.getElementById('post-container');

  if (!post) {
    container.innerHTML = '<div class="py-xl text-center text-muted font-body-md text-body-md">게시글을 찾을 수 없습니다.</div>';
    return;
  }

  document.title = `${post.title} | Jamsil Real Estate`;

  container.innerHTML = `
    <div class="mb-base flex items-center gap-2">
      <span class="px-2 py-0.5 rounded-full bg-secondary-container text-on-secondary-container font-label-sm text-label-sm">${escapeHtml(post.category||'')}</span>
      <span class="text-muted font-label-sm text-label-sm">${escapeHtml(post.date||'')}</span>
    </div>
    <h1 class="font-display-hero text-display-hero text-on-surface mb-xl leading-tight">${escapeHtml(post.title||'')}</h1>
    <hr class="border-border mb-xl">
    <div class="prose-content font-body-lg text-body-lg text-on-surface">${renderMarkdown(post.content||'')}</div>
  `;

  if (isAdmin()) {
    const actions = document.getElementById('admin-actions');
    actions.classList.remove('hidden');
    actions.classList.add('flex');
    document.getElementById('edit-btn').onclick = () => location.href = `news-write.html?id=${post.id}`;
    document.getElementById('delete-btn').onclick = async () => {
      if (!confirm('이 게시글을 삭제하시겠습니까?')) return;
      document.getElementById('delete-btn').disabled = true;
      document.getElementById('delete-btn').textContent = '삭제 중...';
      try {
        await deletePost(post.id);
        location.href = 'news.html';
      } catch(e) {
        alert('삭제 실패: ' + e.message);
        document.getElementById('delete-btn').disabled = false;
        document.getElementById('delete-btn').innerHTML = '<span class="material-symbols-outlined">delete</span>삭제';
      }
    };
  }
}

init();
</script>
</body>
</html>
